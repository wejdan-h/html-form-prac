<!DOCTYPE html>
<html>
<head>
    <title>My Feedback Form</title>
</head>

<body>

<h1>My Feedback Form</h1>

<form action="#" method="post">

    <label>Name:</label>
    <input type="text" name="name"><br><br>

    <label>Email:</label>
    <input type="text" name="email"><br><br>

    <label>Password:</label>
    <input type="password" name="password"><br><br>

    <p>Please check all the emotions that apply to you:</p>

    <input type="checkbox" name="emotion" value="Angry"> Angry<br>
    <input type="checkbox" name="emotion" value="Sad"> Sad<br>
    <input type="checkbox" name="emotion" value="Happy"> Happy<br>
    <input type="checkbox" name="emotion" value="Ambivalent"> Ambivalent<br><br>

    <p>How satisfied were you with our service?</p>

    <input type="radio" name="satisfaction" value="Very Satisfied"> Very Satisfied<br>
    <input type="radio" name="satisfaction" value="Satisfied"> Satisfied<br>
    <input type="radio" name="satisfaction" value="Didn't Care"> Didn't Care<br>
    <input type="radio" name="satisfaction" value="Dissatisfied"> Dissatisfied<br>
    <input type="radio" name="satisfaction" value="Very Dissatisfied"> Very Dissatisfied<br><br>

    <label>Further Comment:</label><br>
    <textarea name="comments" rows="2" cols="30"></textarea><br><br>

    <label>Bio Photo:</label>
    <input type="file" name="photo"><br><br>

    <label>Location Visited:</label>
    <select name="location">
        <option value="Location A">Location A</option>
        <option value="Location W">Location W</option>
        <option value="Location E">Location E</option>
        <option value="Location R">Location R</option>
    </select>

    <br><br>

    <input type="submit" value="Submit">

</form>

</body>
</html>
